<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Configuration Stream</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    #root {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .participant {
      position: absolute;
      transition: box-shadow 0.15s ease, opacity 0.15s ease;
      border-radius: 12px;
      overflow: hidden;
    }
    .participant img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: filter 0.15s ease;
    }
    .participant.speaking {
      /* Effets appliqués dynamiquement */
    }
    .participant:not(.speaking) {
      /* Effets appliqués dynamiquement */
    }
    .participant.muted {
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="editForm" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:0; border:1px solid black; z-index:1000; max-height:90vh; overflow:hidden; border-radius:5px;">
    <h3 id="editFormHeader" style="margin:0; padding:10px; background:#f0f0f0; cursor:move; user-select:none; border-bottom:1px solid #ccc;">Configuration</h3>
    <div style="padding:20px; overflow-y:auto; max-height:calc(90vh - 50px);">
    <label>Nom: <input id="editName" type="text"></label><br>
    <label>Image URL: <input id="editImage" type="text"></label><br>
    <label>Upload image: <input id="editImageFile" type="file" ></label><br>
    <label>Rayon coins: <input id="editBorderRadius" type="number" min="0" step="1"></label><br>
    
    <h4>Position (X, Y)</h4>
    <label>X: <input id="editX" type="number"></label><br>
    <div style="margin: 10px 0;">
      <button type="button" onclick="moveParticle(-10, 0)">◀ -10</button>
      <button type="button" onclick="moveParticle(-1, 0)">◀ -1</button>
      <button type="button" onclick="moveParticle(1, 0)">1 ▶</button>
      <button type="button" onclick="moveParticle(10, 0)">10 ▶</button>
    </div>
    
    <label>Y: <input id="editY" type="number"></label><br>
    <div style="margin: 10px 0;">
      <button type="button" onclick="moveParticle(0, -10)">▲ -10</button>
      <button type="button" onclick="moveParticle(0, -1)">▲ -1</button>
      <button type="button" onclick="moveParticle(0, 1)">▼ 1</button>
      <button type="button" onclick="moveParticle(0, 10)">▼ 10</button>
    </div>
    
    <h4>Taille (Largeur, Hauteur)</h4>
    <label>Largeur: <input id="editWidth" type="number"></label><br>
    <div style="margin: 10px 0;">
      <button type="button" onclick="resizeParticle(-10, 0)">◀ -10</button>
      <button type="button" onclick="resizeParticle(-1, 0)">◀ -1</button>
      <button type="button" onclick="resizeParticle(1, 0)">1 ▶</button>
      <button type="button" onclick="resizeParticle(10, 0)">10 ▶</button>
    </div>
    
    <label>Hauteur: <input id="editHeight" type="number"></label><br>
    <div style="margin: 10px 0;">
      <button type="button" onclick="resizeParticle(0, -10)">▲ -10</button>
      <button type="button" onclick="resizeParticle(0, -1)">▲ -1</button>
      <button type="button" onclick="resizeParticle(0, 1)">▼ 1</button>
      <button type="button" onclick="resizeParticle(0, 10)">▼ 10</button>
    </div>
    
    <h4>Effets visuels</h4>
    <label><input type="checkbox" id="editUseGlobalEffects"> Utiliser les effets globaux</label><br>
    <div id="individualEffects" style="margin-left: 20px;">
      <label><input type="checkbox" id="editUseGrayscale"> Effet grisé quand silencieux</label><br>
      <div style="display:flex; gap:8px; align-items:center; margin:8px 0;">
        <label style="flex:1;">Couleur bordure silence: <input id="editSilentBorderColor" type="color" style="width:60px;"></label>
        <label><input type="checkbox" id="editSilentBorderTransparent"> Transparent</label>
      </div>
      <div style="display:flex; gap:8px; align-items:center; margin:8px 0;">
        <label style="flex:1;">Couleur bordure parole: <input id="editSpeakingBorderColor" type="color" style="width:60px;"></label>
        <label><input type="checkbox" id="editSpeakingBorderTransparent"> Transparent</label>
      </div>
      <label>Épaisseur bordure (px): <input id="editBorderWidth" type="number" min="0" max="10" step="1"></label><br>
      <div style="display:flex; gap:8px; align-items:center; margin:8px 0;">
        <label style="flex:1;">Couleur fond image: <input id="editBgColor" type="color" style="width:60px;"></label>
        <label><input type="checkbox" id="editBgColorTransparent"> Transparent</label>
      </div>
    </div>
    
    <button id="editOK">OK</button>
    <button id="editCancel">Annuler</button>
    </div>
  </div>

  <div id="defaultsPopup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:320px; background:white; border:1px solid #333; z-index:1100; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,0.25);">
    <div style="padding:12px; background:#f4f4f4; border-bottom:1px solid #ccc; display:flex; justify-content:space-between; align-items:center;">
      <strong>Defaults participants</strong>
      <button id="defaultCloseBtn" style="background:none; border:none; font-size:18px; cursor:pointer;">✕</button>
    </div>
    <div style="padding:16px; display:grid; gap:10px;">
      <label>Image par défaut: <input id="defaultImage" type="text" style="width:100%"></label>
      <label>Fond par défaut: <input id="defaultBgColor" type="color"></label>
      <label>Rayon par défaut: <input id="defaultBorderRadius" type="number" min="0" step="1"></label>
      <label>Largeur par défaut: <input id="defaultWidth" type="number" min="1"></label>
      <label>Hauteur par défaut: <input id="defaultHeight" type="number" min="1"></label>
      <button id="defaultSaveBtn">Sauvegarder Defaults</button>
    </div>
  </div>

  <div id="streamConfigPopup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:400px; background:white; border:1px solid #333; z-index:1200; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,0.25);">
    <div style="padding:12px; background:#f4f4f4; border-bottom:1px solid #ccc; display:flex; justify-content:space-between; align-items:center;">
      <strong>Configuration du Stream</strong>
      <button id="streamConfigCloseBtn" style="background:none; border:none; font-size:18px; cursor:pointer;">✕</button>
    </div>
    <div style="padding:16px; display:grid; gap:12px;">
      <label>Nom du stream: <input id="streamName" type="text" style="width:100%; padding:4px;" placeholder="Entrez le nom du stream"></label>
      <label>URL StreamKit: <input id="streamkitUrl" type="text" style="width:100%; padding:4px;" placeholder="https://discord.com/..."></label>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button id="streamConfigCancelBtn" style="padding:8px 16px;">Annuler</button>
        <button id="streamConfigSaveBtn" style="padding:8px 16px; background:#4CAF50; color:white; border:none; border-radius:4px;">Sauvegarder</button>
      </div>
    </div>
  </div>

  <div id="linkUserPopup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:350px; background:white; border:1px solid #333; z-index:1300; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,0.25);">
    <div style="padding:12px; background:#f4f4f4; border-bottom:1px solid #ccc; display:flex; justify-content:space-between; align-items:center;">
      <strong>Lier participant</strong>
      <button id="linkUserCloseBtn" style="background:none; border:none; font-size:18px; cursor:pointer;">✕</button>
    </div>
    <div style="padding:16px; display:grid; gap:12px;">
      <p>Sélectionnez un participant configuré à lier avec cet utilisateur :</p>
      <select id="linkParticipantSelect" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
        <option value="">-- Choisir un participant --</option>
      </select>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button id="linkUserCancelBtn" style="padding:8px 16px;">Annuler</button>
        <button id="linkUserConfirmBtn" style="padding:8px 16px; background:#4CAF50; color:white; border:none; border-radius:4px;">Lier</button>
      </div>
    </div>
  </div>

  <div id="globalEffectsPopup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:420px; background:white; border:1px solid #333; z-index:1200; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,0.25);">
    <div style="padding:12px; background:#f4f4f4; border-bottom:1px solid #ccc; display:flex; justify-content:space-between; align-items:center;">
      <strong>Effets visuels globaux</strong>
      <button id="globalEffectsCloseBtn" style="background:none; border:none; font-size:18px; cursor:pointer;">✕</button>
    </div>
    <div style="padding:16px; display:grid; gap:12px;">
      <label><input type="checkbox" id="globalUseGrayscale"> Utiliser l'effet grisé pour les silencieux</label>
      <div style="display:flex; gap:8px; align-items:center;">
        <label style="flex:1;">Couleur bordure silence: <input id="globalSilentBorderColor" type="color" style="width:60px;"></label>
        <label><input type="checkbox" id="globalSilentBorderTransparent"> Transparent</label>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <label style="flex:1;">Couleur bordure parole: <input id="globalSpeakingBorderColor" type="color" style="width:60px;"></label>
        <label><input type="checkbox" id="globalSpeakingBorderTransparent"> Transparent</label>
      </div>
      <label>Épaisseur bordure (px): <input id="globalBorderWidth" type="number" min="0" max="10" step="1"></label>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button id="globalEffectsCancelBtn" style="padding:8px 16px;">Annuler</button>
        <button id="globalEffectsSaveBtn" style="padding:8px 16px; background:#4CAF50; color:white; border:none; border-radius:4px;">Sauvegarder</button>
      </div>
    </div>
  </div>

  <script>
    const salon = window.location.pathname.split('/')[1];
    const root = document.getElementById("root");
    let config = null;
    const participantsMap = new Map(); // id -> DOM element
    let currentUsers = [];
    let currentEditKey = null;
    let currentLinkUserKey = null; // Pour stocker l'utilisateur à lier

    // État global du drag/resize
    let dragState = {
      active: false,
      isResizing: false,
      isDragging: false,
      startX: 0,
      startY: 0,
      startLeft: 0,
      startTop: 0,
      startWidth: 0,
      startHeight: 0,
      element: null,
      config: null
    };

    function uuidv4() {
      return "10000000-1000-4000-8000-100000000000".replace(/[018]/g, c =>
        (+c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> +c / 4).toString(16)
      );
    }

    function getUserKey(user) {
      return user.id || user.login || user.name || "";
    }

    function moveParticle(dx, dy) {
      if (!currentEditKey) return;
      const entry = participantsMap.get(currentEditKey);
      if (!entry) return;
      const p = entry.config;
      const el = entry.el;
      
      p.x += dx;
      p.y += dy;
      
      el.style.left = p.x + "px";
      el.style.top = p.y + "px";
      
      document.getElementById("editX").value = p.x;
      document.getElementById("editY").value = p.y;
      
      saveConfig();
    }

    function resizeParticle(dw, dh) {
      if (!currentEditKey) return;
      const entry = participantsMap.get(currentEditKey);
      if (!entry) return;
      const p = entry.config;
      const el = entry.el;
      
      p.width = Math.max(50, p.width + dw);
      p.height = Math.max(50, p.height + dh);
      
      el.style.width = p.width + "px";
      el.style.height = p.height + "px";
      
      document.getElementById("editWidth").value = p.width;
      document.getElementById("editHeight").value = p.height;
      
      saveConfig();
    }

    async function loadConfig() {
      const res = await fetch(`/api/${salon}/config`);
      config = await res.json();
      document.body.style.background = config.background || "#000";
      initParticipants();
    }

    function initParticipants() {
      config.participants.forEach(p => {
        const div = document.createElement("div");
        div.className = "participant edit";
        div.style.left = p.x + "px";
        div.style.top = p.y + "px";
        div.style.width = p.width + "px";
        div.style.height = p.height + "px";
        
        // Appliquer la couleur de fond si elle existe
        if (p.bgColor) {
          div.style.backgroundColor = p.bgColorTransparent ? 'transparent' : (p.bgColor || '#000000');
        }
        if (p.borderRadius !== undefined) {
          div.style.borderRadius = p.borderRadius + "px";
        }

        const img = document.createElement("img");
        img.src = p.image;
        img.alt = p.displayName || p.id;

        div.appendChild(img);
        root.appendChild(div);

        participantsMap.set(p.id, { config: p, el: div });
        makeEditable(div, p);
      });
      updateList();
    }

    function makeEditable(div, p) {
      div.style.cursor = "move";
      div.style.border = "2px dashed #fff";
      
      // Appliquer la couleur de fond si elle existe
      if (p.bgColor) {
        div.style.backgroundColor = p.bgColorTransparent ? 'transparent' : (p.bgColor || '#000000');
      }
      if (p.borderRadius !== undefined) {
        div.style.borderRadius = p.borderRadius + "px";
      }

      // Double-click pour ouvrir le formulaire
      div.addEventListener("dblclick", () => {
        editParticipant(p.id);
      });

      // Resize handle
      const handle = document.createElement("div");
      handle.style.position = "absolute";
      handle.style.bottom = "0";
      handle.style.right = "0";
      handle.style.width = "10px";
      handle.style.height = "10px";
      handle.style.background = "red";
      handle.style.cursor = "nw-resize";
      div.appendChild(handle);

      // Mousedown uniquement sur le div
      div.addEventListener("mousedown", (e) => {
        if (e.target === handle) {
          dragState.active = true;
          dragState.isResizing = true;
          dragState.isDragging = false;
          dragState.startX = e.clientX;
          dragState.startY = e.clientY;
          dragState.startWidth = parseInt(div.style.width);
          dragState.startHeight = parseInt(div.style.height);
          dragState.element = div;
          dragState.config = p;
        } else {
          dragState.active = true;
          dragState.isDragging = true;
          dragState.isResizing = false;
          dragState.startX = e.clientX;
          dragState.startY = e.clientY;
          dragState.startLeft = parseInt(div.style.left);
          dragState.startTop = parseInt(div.style.top);
          dragState.element = div;
          dragState.config = p;
        }
        e.preventDefault();
      });
    }

    function applyVoiceState(users) {
      console.log("Applying voice state for", users.length, "users:", users);
      currentUsers = users;
      updateConnectedList();
      updateList();

      const activeIds = new Set();

      users.forEach(u => {
        const key = getUserKey(u);
        activeIds.add(key);

        // Chercher d'abord par userid si disponible
        let entry = null;
        if (u.userid) {
          // Chercher un participant qui a ce userid
          for (const [participantId, participantEntry] of participantsMap) {
            if (participantEntry.config.userId === u.userid) {
              entry = participantEntry;
              break;
            }
          }
        }
        
        // Si pas trouvé par userid, chercher par key normale
        if (!entry) {
          entry = participantsMap.get(key);
        }
        
        if (!entry) {
          return;
        }

        const { el, config: pConfig } = entry;

        if (u.speaking) el.classList.add("speaking");
        else el.classList.remove("speaking");

        if (u.muted) el.classList.add("muted");
        else el.classList.remove("muted");

        // Appliquer les effets visuels
        applyVisualEffectsToElement(el, pConfig, u.speaking);
      });

      participantsMap.forEach(entry => {
        entry.el.style.display = "block";
      });
    }

    function connectWS() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => {
        console.log("WS connecté au salon " + salon);
        // S'abonner au salon
        ws.send(JSON.stringify({ type: 'subscribe', salon: salon }));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === "voiceState") {
          applyVoiceState(data.users);
        } else if (data.type === "configUpdate" && data.salon === salon) {
          config = data.config;
          document.body.style.background = config.background || "#000";
          participantsMap.clear();
          document.querySelectorAll(".participant").forEach(el => el.remove());
          initParticipants();
        }
      };

      ws.onclose = () => {
        console.log("WS fermé, tentative de reconnexion…");
        setTimeout(connectWS, 2000);
      };
    }

    function saveConfig(showAlert = false) {
      const participants = Array.from(participantsMap.values()).map(entry => entry.config);
      const newConfig = { ...config, participants };
      fetch(`/api/${salon}/config`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(newConfig)
      }).then(() => {
        if (showAlert) alert("Config sauvegardée!");
      });
    }

    function updateConnectedList() {
      const list = document.getElementById("connectedList");
      if (!list) return;
      list.innerHTML = "";
      currentUsers.forEach(u => {
        const key = getUserKey(u);
        const li = document.createElement("li");
        
        // Vérifier si l'utilisateur est lié à un participant (via userid)
        let linked = false;
        let linkedParticipantName = null;
        
        if (u.userid) {
          // Chercher si cet utilisateur est lié à un participant existant
          for (const [participantId, participantEntry] of participantsMap) {
            if (participantEntry.config.userId === u.userid) {
              linked = true;
              linkedParticipantName = participantEntry.config.displayName;
              break;
            }
          }
        }
        
        const label = u.name || u.login || u.id;
        let buttons = "";
        if (linked) {
          buttons = `<em>(lié à ${linkedParticipantName})</em>`;
        } else {
          buttons = `<button onclick="createConfigForUser('${key.replace(/'/g, "\\'")}')">Créer config</button> <button onclick="linkUserToParticipant('${key.replace(/'/g, "\\'")}')">Lier</button>`;
        }
        li.innerHTML = `${label} ${u.speaking ? "(parle)" : ""} ${u.muted ? "(muet)" : ""} ${buttons}`;
        list.appendChild(li);
      });
    }

    function createConfigForUser(key) {
      const user = currentUsers.find(u => getUserKey(u) === key);
      if (!user) return;
      if (participantsMap.has(key)) {
        editParticipant(key);
        return;
      }
console.log(user);
      const defaults = config.participantDefaults || {};
      const p = {
        id: key,
        userId: user.userid || null, // Lier automatiquement l'utilisateur à sa config
        displayName: user.name || user.id,
        image: user.avatar || defaults.image || config.defaultImage || "images/default.svg",
        bgColor: defaults.bgColor || "#000000",
        borderRadius: defaults.borderRadius || 0,
        x: 100,
        y: 100,
        width: defaults.width || 200,
        height: defaults.height || 200
      };

      addParticipantObject(p);
      //editParticipant(key);
    }

    function linkUserToParticipant(userKey) {
      const user = currentUsers.find(u => getUserKey(u) === userKey);
      if (!user) return;

      currentLinkUserKey = userKey;

      // Remplir la liste déroulante avec les participants configurés
      const select = document.getElementById("linkParticipantSelect");
      select.innerHTML = '<option value="">-- Choisir un participant --</option>';

      participantsMap.forEach((entry, key) => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = entry.config.displayName || key;
        select.appendChild(option);
      });

      // Afficher la popup
      document.getElementById("linkUserPopup").style.display = "block";
    }

    function updateList() {
      const list = document.getElementById("participantList");
      if (!list) return;
      list.innerHTML = "";
      participantsMap.forEach((entry, key) => {
        const user = currentUsers.find(u => getUserKey(u) === key);
        const currentName = user ? (user.name || user.login || user.id) : null;
        const display = entry.config.displayName + (currentName && currentName !== entry.config.displayName ? ` (${currentName})` : "");
        const li = document.createElement("li");
        
        let buttons = `<button onclick="editParticipant('${key.replace(/'/g, "\\'")}')">Config</button> <button onclick="deleteParticipant('${key.replace(/'/g, "\\'")}')">Suppr</button>`;
        
        // Ajouter le bouton "Supprimer liaison" si le participant a un userid
        if (entry.config.userId) {
          buttons += ` <button onclick="unlinkParticipant('${key.replace(/'/g, "\\'")}')">Suppr liaison</button>`;
        }
        
        li.innerHTML = `${display} ${buttons}`;
        list.appendChild(li);
      });
    }

    function deleteParticipant(key) {
      const entry = participantsMap.get(key);
      if (entry) {
        entry.el.remove();
        participantsMap.delete(key);
        updateList();
        saveConfig();
      }
    }

    function unlinkParticipant(key) {
      const entry = participantsMap.get(key);
      if (entry && entry.config.userId) {
        // Supprimer le userid du participant
        entry.config.userId = null;
        
        // Changer l'ID du participant pour qu'il ne soit plus associé automatiquement à l'utilisateur
        const newId = key + "_unlinked_" + Date.now();
        entry.config.id = newId;
        
        // Mettre à jour participantsMap
        participantsMap.delete(key);
        participantsMap.set(newId, entry);
        
        updateList();
        updateConnectedList();
        saveConfig();
        alert(`Liaison supprimée pour le participant ${entry.config.displayName}`);
      }
    }

    function toggleIndividualEffects(show) {
      const individualEffects = document.getElementById("individualEffects");
      if (individualEffects) {
        individualEffects.style.display = show ? "block" : "none";
      }
    }

    function applyVisualEffectsToElement(el, participant, isSpeaking) {
      const avatar = el.querySelector('.avatar');
      const img = avatar ? avatar.querySelector('img') : null;
      if (!img) return;
      
      // Récupérer les effets visuels (individuels ou globaux)
      const visualEffects = participant.visualEffects || {};
      const useGlobal = visualEffects.useGlobal !== false;
      const effects = useGlobal ? (config.globalVisualEffects || {}) : visualEffects;
      
      // Appliquer l'effet grisé
      const useGrayscale = effects.useGrayscale !== false;
      if (!isSpeaking && useGrayscale) {
        img.style.filter = 'grayscale(1)';
      } else {
        img.style.filter = 'none';
      }
      
      // Appliquer les bordures
      const borderWidth = effects.borderWidth || 3;
      if (isSpeaking) {
        if (effects.speakingBorderTransparent) {
          avatar.style.border = `${borderWidth}px solid 'transparent'`;
          avatar.style.boxShadow = 'none';
        } else {
          avatar.style.border = `${borderWidth}px solid ${effects.speakingBorderColor || '#00ff00'}`;
          avatar.style.boxShadow = `0 0 20px ${effects.speakingBorderColor || '#00ff00'}40`;
        }
      } else {
        if (effects.silentBorderTransparent) {
          avatar.style.border = `${borderWidth}px solid 'transparent'`;
          avatar.style.boxShadow = 'none';
        } else {
          avatar.style.border = `${borderWidth}px solid ${effects.silentBorderColor || '#666666'}`;
          avatar.style.boxShadow = 'none';
        }
      }
    }
  

    // Event listener pour la checkbox des effets globaux
    document.getElementById("editUseGlobalEffects").addEventListener("change", (e) => {
      toggleIndividualEffects(!e.target.checked);
    });

    function editParticipant(key) {
      const entry = participantsMap.get(key);
      if (!entry) return;
      const p = entry.config;
      document.getElementById("editName").value = p.displayName;
      document.getElementById("editImage").value = p.image;
      document.getElementById("editBgColor").value = p.bgColor || config.participantDefaults?.bgColor || "#000000";
      document.getElementById("editBgColorTransparent").checked = p.bgColorTransparent || false;
      document.getElementById("editBorderRadius").value = p.borderRadius ?? (config.participantDefaults?.borderRadius || 0);
      document.getElementById("editX").value = p.x;
      document.getElementById("editY").value = p.y;
      document.getElementById("editWidth").value = p.width;
      document.getElementById("editHeight").value = p.height;
      
      // Effets visuels individuels
      const visualEffects = p.visualEffects || {};
      const useGlobal = visualEffects.useGlobal !== false;
      document.getElementById("editUseGlobalEffects").checked = useGlobal;
      document.getElementById("editUseGrayscale").checked = visualEffects.useGrayscale ?? (config.globalVisualEffects?.useGrayscale ?? true);
      document.getElementById("editSilentBorderColor").value = visualEffects.silentBorderColor || (config.globalVisualEffects?.silentBorderColor || "#666666");
      document.getElementById("editSilentBorderTransparent").checked = visualEffects.silentBorderTransparent || false;
      document.getElementById("editSpeakingBorderColor").value = visualEffects.speakingBorderColor || (config.globalVisualEffects?.speakingBorderColor || "#00ff00");
      document.getElementById("editSpeakingBorderTransparent").checked = visualEffects.speakingBorderTransparent || false;
      document.getElementById("editBorderWidth").value = visualEffects.borderWidth ?? (config.globalVisualEffects?.borderWidth ?? 3);
      
      toggleIndividualEffects(!useGlobal);
      
      document.getElementById("editForm").style.display = "block";
      currentEditKey = key;
    }

    function addParticipantObject(p) {
      if (participantsMap.has(p.id)) return;
      const div = document.createElement("div");
      div.className = "participant edit";
      div.style.left = p.x + "px";
      div.style.top = p.y + "px";
      div.style.width = p.width + "px";
      div.style.height = p.height + "px";
      console.log(p)
      if (p.bgColor) {
        div.style.backgroundColor = p.bgColorTransparent ? 'transparent' : (p.bgColor || '#000000');
      }
      if (p.borderRadius !== undefined) {
        div.style.borderRadius = p.borderRadius + "px";
      }

      const img = document.createElement("img");
      img.src = p.image;
      img.alt = p.displayName;

      div.appendChild(img);
      root.appendChild(div);

      participantsMap.set(p.id, { config: p, el: div });
      makeEditable(div, p);
      updateList();
      saveConfig();
    }

    const controls = document.createElement("div");
    controls.style.position = "absolute";
    controls.style.top = "10px";
    controls.style.right = "10px";
    controls.style.background = "rgba(0,0,0,0.8)";
    controls.style.padding = "10px";
    controls.style.borderRadius = "5px";
    controls.style.color = "white";
    controls.innerHTML = `
      <a href="/" style="color: #5050ff; text-decoration: none; font-weight: bold;">← Retour à l'accueil</a><br>
      <a href="/${salon}/show" style="color: #50aa50; text-decoration: none; font-weight: bold;">→ Aperçu</a><br><br>
      <label>Fond: <input id="backgroundPicker" type="color"></label><br>
      <button id="streamConfigBtn" style="background:#2196F3; color:white; border:none; padding:8px 16px; border-radius:4px; cursor:pointer;">⚙️ Configurer Stream</button><br><br>
      <button id="defaultOpenBtn">Defaults participants</button><br>
      <button id="globalEffectsBtn">Effets visuels globaux</button><br><br>
      <button id="addBtn">Ajouter Participant</button>
      <button id="saveBtn">Sauvegarder Config</button>
      <h4>Participants configurés:</h4>
      <ul id="participantList" style="list-style: none; padding: 0;"></ul>
      <h4>Participants connectés:</h4>
      <ul id="connectedList" style="list-style: none; padding: 0;"></ul>
    `;
    document.body.appendChild(controls);
    document.getElementById("addBtn").addEventListener("click", () => {
      const name = "<nom>";

      const defaults = config.participantDefaults || {};
      const newId = uuidv4();
      const p = { 
        id: newId, 
        displayName: name, 
        image: "images/default.svg", 
        bgColor: defaults.bgColor || "#000000", 
        borderRadius: defaults.borderRadius || 0, 
        x: 100, 
        y: 100, 
        width: defaults.width || 200, 
        height: defaults.height || 200 
      };
      addParticipantObject(p);
      editParticipant(newId);
    });
    document.getElementById("saveBtn").addEventListener("click", () => saveConfig(true));
    document.getElementById("defaultOpenBtn").addEventListener("click", () => {
      document.getElementById("defaultsPopup").style.display = "block";
    });
    document.getElementById("defaultCloseBtn").addEventListener("click", () => {
      document.getElementById("defaultsPopup").style.display = "none";
    });
    document.getElementById("defaultSaveBtn").addEventListener("click", () => {
      const defaults = config.participantDefaults || {};
      defaults.image = document.getElementById("defaultImage").value;
      defaults.bgColor = document.getElementById("defaultBgColor").value;
      defaults.borderRadius = parseInt(document.getElementById("defaultBorderRadius").value) || 0;
      defaults.width = parseInt(document.getElementById("defaultWidth").value) || 200;
      defaults.height = parseInt(document.getElementById("defaultHeight").value) || 200;
      config.participantDefaults = defaults;
      saveConfig(true);
      document.getElementById("defaultsPopup").style.display = "none";
    });

    // Effets visuels globaux popup
    document.getElementById("globalEffectsBtn").addEventListener("click", () => {
      const effects = config.globalVisualEffects || {};
      document.getElementById("globalUseGrayscale").checked = effects.useGrayscale !== false;
      document.getElementById("globalSilentBorderColor").value = effects.silentBorderColor || "#666666";
      document.getElementById("globalSilentBorderTransparent").checked = effects.silentBorderTransparent || false;
      document.getElementById("globalSpeakingBorderColor").value = effects.speakingBorderColor || "#00ff00";
      document.getElementById("globalSpeakingBorderTransparent").checked = effects.speakingBorderTransparent || false;
      document.getElementById("globalBorderWidth").value = effects.borderWidth || 3;
      document.getElementById("globalEffectsPopup").style.display = "block";
    });
    document.getElementById("globalEffectsCloseBtn").addEventListener("click", () => {
      document.getElementById("globalEffectsPopup").style.display = "none";
    });
    document.getElementById("globalEffectsCancelBtn").addEventListener("click", () => {
      document.getElementById("globalEffectsPopup").style.display = "none";
    });
    document.getElementById("globalEffectsSaveBtn").addEventListener("click", () => {
      const effects = config.globalVisualEffects || {};
      effects.useGrayscale = document.getElementById("globalUseGrayscale").checked;
      effects.silentBorderColor = document.getElementById("globalSilentBorderColor").value;
      effects.silentBorderTransparent = document.getElementById("globalSilentBorderTransparent").checked;
      effects.speakingBorderColor = document.getElementById("globalSpeakingBorderColor").value;
      effects.speakingBorderTransparent = document.getElementById("globalSpeakingBorderTransparent").checked;
      effects.borderWidth = parseInt(document.getElementById("globalBorderWidth").value) || 3;
      config.globalVisualEffects = effects;
      saveConfig(true);
      document.getElementById("globalEffectsPopup").style.display = "none";
    });

    // Configuration du stream popup
    document.getElementById("streamConfigBtn").addEventListener("click", () => {
      document.getElementById("streamName").value = config.name || "";
      document.getElementById("streamkitUrl").value = config.streamkitUrl || "";
      document.getElementById("streamConfigPopup").style.display = "block";
    });
    document.getElementById("streamConfigCloseBtn").addEventListener("click", () => {
      document.getElementById("streamConfigPopup").style.display = "none";
    });
    document.getElementById("streamConfigCancelBtn").addEventListener("click", () => {
      document.getElementById("streamConfigPopup").style.display = "none";
    });
    document.getElementById("streamConfigSaveBtn").addEventListener("click", () => {
      const name = document.getElementById("streamName").value.trim();
      const url = document.getElementById("streamkitUrl").value.trim();
      
      if (!name || !url) {
        alert("Le nom et l'URL sont requis.");
        return;
      }
      
      config.name = name;
      config.streamkitUrl = url;
      
      fetch(`/api/${salon}/config`, {
        method: "POST", 
        headers: { "Content-Type": "application/json" }, 
        body: JSON.stringify({ name: name, streamkitUrl: url }) 
      }).then(() => {
        alert("Configuration sauvegardée. Redémarrez le stream pour appliquer les changements.");
        document.getElementById("streamConfigPopup").style.display = "none";
      }).catch(err => {
        console.error(err);
        alert("Erreur lors de la sauvegarde.");
      });
    });

    function initBackgroundPicker() {
      const bgPicker = document.getElementById("backgroundPicker");
      if (!bgPicker || !config) return;
      bgPicker.value = config.background || "#000000";
      bgPicker.addEventListener("input", (e) => {
        config.background = e.target.value;
        document.body.style.background = config.background;
        saveConfig();
      });

      const defaultImage = document.getElementById("defaultImage");
      const defaultBgColor = document.getElementById("defaultBgColor");
      const defaultBorderRadius = document.getElementById("defaultBorderRadius");
      const defaultWidth = document.getElementById("defaultWidth");
      const defaultHeight = document.getElementById("defaultHeight");
      if (defaultImage && defaultBgColor && defaultBorderRadius && defaultWidth && defaultHeight) {
        const defaults = config.participantDefaults || {};
        defaultImage.value = defaults.image || config.defaultImage || "images/default.svg";
        defaultBgColor.value = defaults.bgColor || "#ffffff";
        defaultBorderRadius.value = defaults.borderRadius || 0;
        defaultWidth.value = defaults.width || 200;
        defaultHeight.value = defaults.height || 200;
      }
    }

    document.getElementById("editImageFile").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const uploadPath = await uploadImageFile(file);
        document.getElementById("editImage").value = uploadPath;
      } catch (err) {
        console.error(err);
        alert("Échec de l'upload de l'image.");
      }
    });

    async function uploadImageFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async () => {
          try {
            const res = await fetch(`/api/${salon}/upload-image`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ data: reader.result, name: file.name })
            });
            const json = await res.json();
            if (json.path) resolve(json.path);
            else reject(new Error('Upload failed'));
          } catch (err) {
            reject(err);
          }
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById("editOK").addEventListener("click", () => {
      const entry = participantsMap.get(currentEditKey);
      if (!entry) return;
      const p = entry.config;
      p.displayName = document.getElementById("editName").value;
      p.image = document.getElementById("editImage").value;
      p.bgColor = document.getElementById("editBgColor").value;
      p.bgColorTransparent = document.getElementById("editBgColorTransparent").checked;
      p.borderRadius = parseInt(document.getElementById("editBorderRadius").value) || 0;
      p.x = parseInt(document.getElementById("editX").value) || 0;
      p.y = parseInt(document.getElementById("editY").value) || 0;
      p.width = parseInt(document.getElementById("editWidth").value) || 200;
      p.height = parseInt(document.getElementById("editHeight").value) || 200;

      // Effets visuels individuels
      const visualEffects = p.visualEffects || {};
      visualEffects.useGlobal = document.getElementById("editUseGlobalEffects").checked;
      if (!visualEffects.useGlobal) {
        visualEffects.useGrayscale = document.getElementById("editUseGrayscale").checked;
        visualEffects.silentBorderColor = document.getElementById("editSilentBorderColor").value;
        visualEffects.silentBorderTransparent = document.getElementById("editSilentBorderTransparent").checked;
        visualEffects.speakingBorderColor = document.getElementById("editSpeakingBorderColor").value;
        visualEffects.speakingBorderTransparent = document.getElementById("editSpeakingBorderTransparent").checked;
        visualEffects.borderWidth = parseInt(document.getElementById("editBorderWidth").value) || 3;
      } else {
        // Si on utilise les valeurs globales, on nettoie les valeurs individuelles
        delete visualEffects.useGrayscale;
        delete visualEffects.silentBorderColor;
        delete visualEffects.silentBorderTransparent;
        delete visualEffects.speakingBorderColor;
        delete visualEffects.speakingBorderTransparent;
        delete visualEffects.borderWidth;
      }
      p.visualEffects = visualEffects;

      const el = entry.el;
      el.style.left = p.x + "px";
      el.style.top = p.y + "px";
      el.style.width = p.width + "px";
      el.style.height = p.height + "px";
      el.style.backgroundColor = p.bgColorTransparent ? "transparent" : p.bgColor;
      el.style.borderRadius = p.borderRadius + "px";
      el.querySelector("img").src = p.image;
      el.querySelector("img").alt = p.displayName;

      document.getElementById("editForm").style.display = "none";
      currentEditKey = null;
      updateList();
      saveConfig();
    });

    document.getElementById("editCancel").addEventListener("click", () => {
      document.getElementById("editForm").style.display = "none";
      currentEditKey = null;
    });

    // Listeners globaux pour drag/resize optimisés
    document.addEventListener("mousemove", (e) => {
      if (!dragState.active) return;
      
      const div = dragState.element;
      const p = dragState.config;

      if (dragState.isResizing) {
        const newWidth = Math.max(50, dragState.startWidth + (e.clientX - dragState.startX));
        const newHeight = Math.max(50, dragState.startHeight + (e.clientY - dragState.startY));
        div.style.width = newWidth + "px";
        div.style.height = newHeight + "px";
        p.width = newWidth;
        p.height = newHeight;
      } else if (dragState.isDragging) {
        const dx = e.clientX - dragState.startX;
        const dy = e.clientY - dragState.startY;
        div.style.left = (dragState.startLeft + dx) + "px";
        div.style.top = (dragState.startTop + dy) + "px";
        p.x = dragState.startLeft + dx;
        p.y = dragState.startTop + dy;
      }
    });

    document.addEventListener("mouseup", () => {
      if (dragState.active) {
        dragState.active = false;
        dragState.isResizing = false;
        dragState.isDragging = false;
        saveConfig();
      }
    });

    // Event listeners pour la popup de liaison
    document.getElementById("linkUserCloseBtn").addEventListener("click", () => {
      document.getElementById("linkUserPopup").style.display = "none";
      currentLinkUserKey = null;
    });

    document.getElementById("linkUserCancelBtn").addEventListener("click", () => {
      document.getElementById("linkUserPopup").style.display = "none";
      currentLinkUserKey = null;
    });

    document.getElementById("linkUserConfirmBtn").addEventListener("click", () => {
      const selectedParticipantId = document.getElementById("linkParticipantSelect").value;
      if (!selectedParticipantId || !currentLinkUserKey) {
        alert("Veuillez sélectionner un participant.");
        return;
      }

      const user = currentUsers.find(u => getUserKey(u) === currentLinkUserKey);
      if (!user) {
        alert("Utilisateur non trouvé.");
        return;
      }

      // Modifier la configuration existante du participant sélectionné
      const selectedEntry = participantsMap.get(selectedParticipantId);
      if (!selectedEntry) {
        alert("Participant sélectionné non trouvé.");
        return;
      }

      // Ajouter l'ID utilisateur à la configuration existante
      selectedEntry.config.userId = user.userid || null;

      // Sauvegarder la configuration modifiée
      saveConfig();

      // Fermer la popup
      document.getElementById("linkUserPopup").style.display = "none";
      currentLinkUserKey = null;

      // Mettre à jour l'affichage
      updateConnectedList();
      updateList();

      alert(`Utilisateur ${user.name || user.id} lié au participant ${selectedEntry.config.displayName}`);
    });

    loadConfig().then(() => {
      initBackgroundPicker();
      connectWS();
    });
  </script>
</body>
</html>
